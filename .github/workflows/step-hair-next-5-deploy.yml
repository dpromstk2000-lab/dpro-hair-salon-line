      - name: Validate generated page
        shell: bash
        run: |
          set -euo pipefail
          test -s owner.html
          grep -q "HAIR-NEXT-5-OWNER-TODAY-DASHBOARD-20260722" owner.html
          grep -q 'src="./config.js?v=hair-next-4"' owner.html
          grep -q 'data-view-panel="today"' owner.html
          grep -q 'data-view-panel="settings"' owner.html
          python - <<'PY_CHECK'
          from pathlib import Path
          text = Path('owner.html').read_text(encoding='utf-8')
          assert text.count('<html') == 1
          assert text.count('</html>') == 1
          assert text.count('<script') >= 2
          assert text.count('</script>') >= 2
          assert 'HAIR-NEXT-5-OWNER-TODAY-DASHBOARD-20260722' in text
          print('owner.html static validation: OK')
          PY_CHECK

      - name: Remove temporary workflow
        shell: bash
        run: rm -f ".github/workflows/step-hair-next-5-deploy.yml"

      - name: Commit and push owner.html
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "DPRO Deploy Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A owner.html ".github/workflows/step-hair-next-5-deploy.yml"
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "STEP HAIR-NEXT-5 deploy today salon owner dashboard"
          git push origin main
