      - name: Validate NEXT-9-R1 owner
        shell: bash
        run: |
          set -euo pipefail
          test -s owner.html
          grep -q "HAIR-NEXT-9-R1-ADMIN-CODE-UX-FIX-20260723" owner.html
          grep -q 'state.demoCodeCleared=true' owner.html
          grep -q 'allowDemoPrefill:false' owner.html
          grep -q 'function clearAdminCodeInputs' owner.html
          grep -q 'bottom:18px!important' owner.html
          grep -q 'id="demoAdminHint" hidden' owner.html
          ! grep -q 'DPRO_HAIR.utils.showToast?.(message' owner.html

          python - <<'PY_VALIDATE'
          from pathlib import Path
          import re

          text = Path("owner.html").read_text(encoding="utf-8")
          static_html = text.split("<script", 1)[0]
          ids = re.findall(r'\bid="([^"]+)"', static_html)
          duplicates = sorted(set(item for item in ids if ids.count(item) > 1))
          assert not duplicates, duplicates

          scripts = re.findall(
              r"<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>",
              text,
              re.S | re.I,
          )
          Path("/tmp/owner-next9-r1.js").write_text(
              "\n".join(scripts),
              encoding="utf-8",
          )
          print("NEXT-9-R1 static validation: OK")
          PY_VALIDATE

          node --check /tmp/owner-next9-r1.js

      - name: Remove temporary workflow
        shell: bash
        run: rm -f ".github/workflows/step-hair-next-9-r1-admin-code-ux.yml"

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "DPRO Deploy Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "STEP HAIR-NEXT-9-R1 fix admin code clear and notice overlap"
          git push origin main
