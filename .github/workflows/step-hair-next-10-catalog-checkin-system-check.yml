      - name: Validate NEXT-10 pages
        shell: bash
        run: |
          set -euo pipefail
          test -s index.html
          test -s system-check.html
          grep -q "HAIR-NEXT-10-CATALOG-CHECKIN-20260723" index.html
          grep -q "HAIR-NEXT-10-SYSTEM-CHECK-COMPLETION-20260723" system-check.html
          grep -q 'id="catalogView"' index.html
          grep -q 'id="checkinView"' index.html
          grep -q 'publicCatalog' index.html
          grep -q 'checkinStatus' index.html
          grep -q 'api.checkin' index.html
          grep -q '検査対象 8画面' system-check.html
          grep -q 'HAIR-NEXT-9-R2-DISCONNECT-DATA-RESET-20260723' system-check.html
          grep -q 'HAIR-NEXT-7-R1-STAFF-WORKFLOW-20260722' system-check.html
          grep -q 'HAIR-NEXT-7-R1-IPAD-RECEPTION-20260722' system-check.html

          python - <<'PY_VALIDATE'
          from pathlib import Path
          import re

          for filename in ["index.html","system-check.html"]:
              text=Path(filename).read_text(encoding="utf-8")
              static=text.split("<script",1)[0]
              ids=re.findall(r'\bid="([^"]+)"',static)
              duplicates=sorted(set(x for x in ids if ids.count(x)>1))
              assert not duplicates,(filename,duplicates)
              scripts=re.findall(r"<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>",text,re.S|re.I)
              Path("/tmp/"+filename+".next10.js").write_text("\n".join(scripts),encoding="utf-8")
          print("NEXT-10 HTML validation: OK")
          PY_VALIDATE

          node --check /tmp/index.html.next10.js
          node --check /tmp/system-check.html.next10.js

      - name: Remove temporary workflow
        shell: bash
        run: rm -f ".github/workflows/step-hair-next-10-catalog-checkin-system-check.yml"

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "DPRO Deploy Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "STEP HAIR-NEXT-10 add catalog checkin and final system check"
          git push origin main
