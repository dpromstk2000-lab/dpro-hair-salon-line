      - name: Validate NEXT-8-R1 files
        shell: bash
        run: |
          set -euo pipefail
          test -s config.js
          test -s member.html
          grep -q "HAIR-NEXT-8-R1-COMMON-CONFIG-20260723" config.js
          grep -q "HAIR-NEXT-8-R1-WORKER-MEMBER-CONSISTENCY-20260723" config.js
          grep -q "HAIR-NEXT-8-R1-MEMBER-CONSISTENCY-20260723" member.html
          grep -q 'id="pastPendingCard"' member.html
          grep -q 'renderPastPending' member.html
          grep -q 'おすすめ時期を過ぎています' member.html

          node --check config.js

          python - <<'PY_VALIDATE'
          from pathlib import Path
          import re

          text = Path("member.html").read_text(encoding="utf-8")
          static_html = text.split("<script", 1)[0]
          ids = re.findall(r'\bid="([^"]+)"', static_html)
          duplicates = sorted(set(item for item in ids if ids.count(item) > 1))
          assert not duplicates, duplicates

          scripts = re.findall(
              r"<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>",
              text,
              re.S | re.I,
          )
          Path("/tmp/member-next8-r1.js").write_text(
              "\n".join(scripts),
              encoding="utf-8",
          )
          print("NEXT-8-R1 static validation: OK")
          PY_VALIDATE

          node --check /tmp/member-next8-r1.js

      - name: Remove temporary workflow
        shell: bash
        run: rm -f ".github/workflows/step-hair-next-8-r1-member-consistency.yml"

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "DPRO Deploy Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "STEP HAIR-NEXT-8-R1 fix member visit and rebook consistency"
          git push origin main
