      - name: Validate owner.html
        shell: bash
        run: |
          set -euo pipefail
          test -s owner.html
          grep -q "HAIR-NEXT-6-360-CARTE-FOLLOW-20260722" owner.html
          grep -q 'id="noteModal"' owner.html
          grep -q 'id="hairRecordModal"' owner.html
          grep -q 'id="formulaModal"' owner.html
          grep -q 'id="proposalModal"' owner.html
          grep -q 'id="followActionModal"' owner.html
          grep -q "function renderCarte" owner.html
          grep -q "function saveFollowAction" owner.html
          python - <<'PY_EXTRACT'
          from pathlib import Path
          import re

          text = Path("owner.html").read_text(encoding="utf-8")
          required = [
              "HAIR-NEXT-6-360-CARTE-FOLLOW-20260722",
              'id="carteContent"',
              'id="followStats"',
              'id="noteForm"',
              'id="hairRecordForm"',
              'id="formulaForm"',
              'id="proposalForm"',
              'id="followActionForm"',
          ]
          for item in required:
              assert item in text, item

          # Static HTML IDs only.
          # JavaScript template strings such as id="${r.id}" are dynamic output,
          # so they must not be treated as duplicate IDs in the source document.
          head_and_body = text.split("<script", 1)[0]
          ids = re.findall(r'\bid="([^"]+)"', head_and_body)
          duplicates = sorted(set(item for item in ids if ids.count(item) > 1))
          assert not duplicates, duplicates

          scripts = re.findall(
              r"<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>",
              text,
              re.S | re.I,
          )
          Path("/tmp/owner-next6-inline.js").write_text(
              "\n".join(scripts),
              encoding="utf-8",
          )
          print("owner.html NEXT-6 static validation: OK")
          PY_EXTRACT
          node --check /tmp/owner-next6-inline.js

      - name: Remove temporary workflow
        shell: bash
        run: |
          rm -f ".github/workflows/step-hair-next-6-carte-follow.yml"
          rm -f ".github/workflows/step-hair-next-6-r1-carte-follow.yml"

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "DPRO Deploy Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A owner.html ".github/workflows/step-hair-next-6-carte-follow.yml" ".github/workflows/step-hair-next-6-r1-carte-follow.yml"
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "STEP HAIR-NEXT-6-R1 add 360 carte and follow workflow"
          git push origin main
