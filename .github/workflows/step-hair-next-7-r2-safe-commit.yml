      - name: Validate R2 pages
        shell: bash
        run: |
          set -euo pipefail
          test -s staff.html
          test -s owner-ipad.html
          grep -q "HAIR-NEXT-7-R1-STAFF-WORKFLOW-20260722" staff.html
          grep -q "HAIR-NEXT-7-R1-IPAD-RECEPTION-20260722" owner-ipad.html
          grep -q 'const DEMO_MODE=PARAMS.get("demo")==="1"' staff.html
          grep -q 'const DEMO_MODE=PARAMS.get("demo")==="1"' owner-ipad.html
          grep -q 'else if(INITIAL_RESERVATION_ID)' staff.html
          grep -q 'reservation_id:S.selected?.id||undefined' owner-ipad.html
          ! grep -q 'getCode()||C().config.demo.adminCode' staff.html
          ! grep -q 'getCode()||C().config.demo.adminCode' owner-ipad.html

          python - <<'PY_VALIDATE'
          from pathlib import Path
          import re

          for page in ("staff.html", "owner-ipad.html"):
              text = Path(page).read_text(encoding="utf-8")

              static_html = text.split("<script", 1)[0]
              ids = re.findall(r'\bid="([^"]+)"', static_html)
              duplicates = sorted(set(item for item in ids if ids.count(item) > 1))
              assert not duplicates, (page, duplicates)

              scripts = re.findall(
                  r"<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>",
                  text,
                  re.S | re.I,
              )
              Path("/tmp/" + page + ".r2.js").write_text(
                  "\n".join(scripts),
                  encoding="utf-8",
              )

          print("NEXT-7-R2 HTML validation: OK")
          PY_VALIDATE

          node --check /tmp/staff.html.r2.js
          node --check /tmp/owner-ipad.html.r2.js

      - name: Remove temporary workflows
        shell: bash
        run: |
          rm -f ".github/workflows/step-hair-next-7-staff-ipad.yml"
          rm -f ".github/workflows/step-hair-next-7-r1-production-guard.yml"
          rm -f ".github/workflows/step-hair-next-7-r2-safe-commit.yml"

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "DPRO Deploy Bot"
          git config user.email "actions@users.noreply.github.com"

          # Stage every existing change and deletion safely.
          # This does not fail when an old workflow path is already absent.
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "STEP HAIR-NEXT-7-R2 safely publish staff and iPad fixes"
          git push origin main
