      - name: Validate corrected page
        shell: bash
        run: |
          set -euo pipefail
          test -s owner.html
          grep -q "HAIR-NEXT-5-R2-ADMIN-CONNECTION-UX-20260722" owner.html
          grep -q 'id="topAdminCodeClear"' owner.html
          grep -q 'id="topAdminConnectionStatus"' owner.html
          grep -q "clearSavedAdminCode" owner.html
          grep -q "管理コードを確認しています" owner.html
          grep -q 'src="./config.js?v=hair-next-4-r2"' owner.html
          python - <<'PY_CHECK'
          from pathlib import Path
          text = Path("owner.html").read_text(encoding="utf-8")
          required = [
              'id="topAdminCodeInput"',
              'id="topAdminCodeSave"',
              'id="topAdminCodeClear"',
              'id="topAdminConnectionStatus"',
              "clearSavedAdminCode",
              "HAIR-NEXT-5-R2-ADMIN-CONNECTION-UX-20260722",
          ]
          for item in required:
              assert item in text, item
          assert text.count("<html") == 1
          assert text.count("</html>") == 1
          print("owner.html R2 validation: OK")
          PY_CHECK

      - name: Remove temporary workflow
        shell: bash
        run: rm -f ".github/workflows/step-hair-next-5-r2-admin-connection-fix.yml"

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "DPRO Deploy Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A owner.html ".github/workflows/step-hair-next-5-r2-admin-connection-fix.yml"
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "STEP HAIR-NEXT-5-R2 improve admin connection feedback"
          git push origin main
