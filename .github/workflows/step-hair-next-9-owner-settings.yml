      - name: Validate NEXT-9 files
        shell: bash
        run: |
          set -euo pipefail
          test -s config.js
          test -s owner.html
          grep -q "HAIR-NEXT-9-COMMON-CONFIG-20260723" config.js
          grep -q "HAIR-NEXT-9-WORKER-SETTINGS-CAPACITY-20260723" config.js
          grep -q "HAIR-NEXT-9-OWNER-SETTINGS-CENTER-20260723" owner.html
          grep -q 'id="businessHoursEditor"' owner.html
          grep -q 'id="specialDayList"' owner.html
          grep -q 'id="menuModal"' owner.html
          grep -q 'id="menuSetModal"' owner.html
          grep -q 'id="staffModal"' owner.html
          grep -q 'function saveSettings' owner.html
          grep -q 'function saveMenu' owner.html
          grep -q 'function saveMenuSet' owner.html
          grep -q 'function saveStaff' owner.html
          ! grep -q 'getCode()||DPRO_HAIR.config.demo.adminCode' owner.html

          node --check config.js

          python - <<'PY_VALIDATE'
          from pathlib import Path
          import re

          text = Path("owner.html").read_text(encoding="utf-8")
          static_html = text.split("<script", 1)[0]
          ids = re.findall(r'\bid="([^"]+)"', static_html)
          duplicates = sorted(set(item for item in ids if ids.count(item) > 1))
          assert not duplicates, duplicates

          scripts = re.findall(
              r"<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>",
              text,
              re.S | re.I,
          )
          Path("/tmp/owner-next9.js").write_text(
              "\n".join(scripts),
              encoding="utf-8",
          )
          print("NEXT-9 owner static validation: OK")
          PY_VALIDATE

          node --check /tmp/owner-next9.js

      - name: Remove temporary workflow
        shell: bash
        run: rm -f ".github/workflows/step-hair-next-9-owner-settings.yml"

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "DPRO Deploy Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "STEP HAIR-NEXT-9 add owner settings center"
          git push origin main
