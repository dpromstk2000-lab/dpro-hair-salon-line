      - name: Validate source files
        shell: bash
        run: |
          set -euo pipefail
          test -s owner.html
          test -s config.js
          grep -q "HAIR-NEXT-5-R3-DATE-ADMIN-CONTROL-FIX-20260722" owner.html
          grep -q "HAIR-NEXT-4-R3-DATE-FORMAT-FIX-20260722" config.js
          grep -q 'id="topAdminCodeClear">保存コード削除</button>' owner.html
          grep -q 'id="topAdminCodeForm"' owner.html
          grep -q 'weekday:"short"' owner.html
          grep -q "options.weekday === true" config.js
          grep -q "weekday: weekdayOption" config.js
          node --check config.js
          python - <<'PY_EXTRACT'
          from pathlib import Path
          import re
          text = Path("owner.html").read_text(encoding="utf-8")
          scripts = re.findall(r"<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>", text, re.S | re.I)
          Path("/tmp/owner-inline-r3.js").write_text("\n".join(scripts), encoding="utf-8")
          assert 'id="topAdminCodeClear">保存コード削除</button>' in text
          assert "bindEvents();" in text
          print("owner.html extraction: OK")
          PY_EXTRACT
          node --check /tmp/owner-inline-r3.js

      - name: Runtime test date formatting
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/config-runtime-r3.js <<'NODE_TEST'
          global.window = {
            localStorage: { getItem: () => null, setItem: () => {}, removeItem: () => {} },
            sessionStorage: { getItem: () => null, setItem: () => {}, removeItem: () => {} },
            location: { href: "https://example.test/owner.html" },
            history: { replaceState: () => {}, pushState: () => {} },
            dispatchEvent: () => {},
            setTimeout,
            clearTimeout,
            requestAnimationFrame: (callback) => callback(),
            fetch: async () => ({ ok: true, status: 200, headers: new Headers({"Content-Type":"application/json"}), json: async () => ({ok:true}) })
          };
          require(process.cwd() + "/config.js");
          const utils = window.DPRO_HAIR.utils;
          const withBoolean = utils.formatDate("2026-07-22", { weekday: true });
          const withString = utils.formatDate("2026-07-22", { weekday: "short" });
          const withoutWeekday = utils.formatDate("2026-07-22", { weekday: false });
          if (!withBoolean || !withString || !withoutWeekday) throw new Error("date format failed");
          console.log({withBoolean, withString, withoutWeekday});
          NODE_TEST
          node /tmp/config-runtime-r3.js

      - name: Remove temporary workflow
        shell: bash
        run: rm -f ".github/workflows/step-hair-next-5-r3-date-admin-fix.yml"

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "DPRO Deploy Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A owner.html config.js ".github/workflows/step-hair-next-5-r3-date-admin-fix.yml"
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "STEP HAIR-NEXT-5-R3 fix date format and admin controls"
          git push origin main
