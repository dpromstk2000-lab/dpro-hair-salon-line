      - name: Validate NEXT-9-R2 owner
        shell: bash
        run: |
          set -euo pipefail
          test -s owner.html
          grep -q "HAIR-NEXT-9-R2-DISCONNECT-DATA-RESET-20260723" owner.html
          grep -q 'function resetAdminDataState' owner.html
          grep -q 'function renderDisconnectedAdminData' owner.html
          grep -q 'function disconnectAdminData' owner.html
          grep -q 'adminSessionGeneration' owner.html
          grep -q 'state.customerDetail=null' owner.html
          grep -q 'state.followTasks=\[\]' owner.html
          grep -q 'state.menus=null' owner.html
          grep -q 'state.settings=null' owner.html
          grep -q 'state.csvImports=\[\]' owner.html
          grep -q 'setAdminActionAvailability(false)' owner.html
          grep -q 'switchView("today",{skipEnsure:true})' owner.html
          grep -q 'if(!isAdminConnected()){renderDisconnectedAdminData();return null;}' owner.html

          python - <<'PY_VALIDATE'
          from pathlib import Path
          import re

          text = Path("owner.html").read_text(encoding="utf-8")
          static_html = text.split("<script", 1)[0]
          ids = re.findall(r'\bid="([^"]+)"', static_html)
          duplicates = sorted(set(item for item in ids if ids.count(item) > 1))
          assert not duplicates, duplicates

          scripts = re.findall(
              r"<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>",
              text,
              re.S | re.I,
          )
          Path("/tmp/owner-next9-r2.js").write_text(
              "\n".join(scripts),
              encoding="utf-8",
          )
          print("NEXT-9-R2 static validation: OK")
          PY_VALIDATE

          node --check /tmp/owner-next9-r2.js

      - name: Remove temporary workflow
        shell: bash
        run: rm -f ".github/workflows/step-hair-next-9-r2-disconnect-data-reset.yml"

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "DPRO Deploy Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "STEP HAIR-NEXT-9-R2 clear all admin data on disconnect"
          git push origin main
