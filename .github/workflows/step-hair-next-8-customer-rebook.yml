      - name: Validate NEXT-8 pages
        shell: bash
        run: |
          set -euo pipefail
          test -s index.html
          test -s member.html
          grep -q "HAIR-NEXT-8-CUSTOMER-REBOOK-20260723" index.html
          grep -q "HAIR-NEXT-8-MEMBER-PORTAL-20260723" member.html
          grep -q 'src="./config.js?v=hair-next-4-r3-next8"' index.html
          grep -q 'src="./config.js?v=hair-next-4-r3-next8"' member.html
          grep -q 'rebookOptions' index.html
          grep -q 'reservation_id:S.rebook.last_reservation.id' index.html
          grep -q 'photo_album_locked' member.html
          grep -q 'requestCancel' member.html

          python - <<'PY_VALIDATE'
          from pathlib import Path
          import re

          pages = {
              "index.html": [
                  "HAIR-NEXT-8-CUSTOMER-REBOOK-20260723",
                  'id="rebookModeButton"',
                  'id="rebookCard"',
                  'id="quickDates"',
                  'id="slotGrid"',
                  'id="confirmDialog"',
              ],
              "member.html": [
                  "HAIR-NEXT-8-MEMBER-PORTAL-20260723",
                  'id="rebookButton"',
                  'id="upcomingList"',
                  'id="albumGrid"',
                  'id="historyList"',
                  'id="cancelDialog"',
              ],
          }

          for page, required in pages.items():
              text = Path(page).read_text(encoding="utf-8")
              for item in required:
                  assert item in text, (page, item)

              static_html = text.split("<script", 1)[0]
              ids = re.findall(r'\bid="([^"]+)"', static_html)
              duplicates = sorted(set(item for item in ids if ids.count(item) > 1))
              assert not duplicates, (page, duplicates)

              scripts = re.findall(
                  r"<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>",
                  text,
                  re.S | re.I,
              )
              Path("/tmp/" + page + ".next8.js").write_text(
                  "\n".join(scripts),
                  encoding="utf-8",
              )

          print("NEXT-8 static HTML validation: OK")
          PY_VALIDATE

          node --check /tmp/index.html.next8.js
          node --check /tmp/member.html.next8.js

          grep -q 'PUBLIC_REBOOK_OPTIONS:' config.js
          grep -q 'PUBLIC_REBOOK:' config.js
          grep -q 'MEMBER_PROFILE:' config.js
          grep -q 'PUBLIC_CANCEL_REQUEST:' config.js

      - name: Remove temporary workflow
        shell: bash
        run: rm -f ".github/workflows/step-hair-next-8-customer-rebook.yml"

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "DPRO Deploy Bot"
          git config user.email "actions@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "STEP HAIR-NEXT-8 improve customer rebook and member portal"
          git push origin main
