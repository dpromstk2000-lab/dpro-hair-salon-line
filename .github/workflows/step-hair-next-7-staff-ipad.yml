      - name: Validate pages
        shell: bash
        run: |
          set -euo pipefail
          test -s staff.html
          test -s owner-ipad.html
          grep -q "HAIR-NEXT-7-STAFF-WORKFLOW-20260722" staff.html
          grep -q "HAIR-NEXT-7-IPAD-RECEPTION-20260722" owner-ipad.html
          grep -q 'src="./config.js?v=hair-next-4-r3-next7"' staff.html
          grep -q 'src="./config.js?v=hair-next-4-r3-next7"' owner-ipad.html
          grep -q 'id="adminClear"' staff.html
          grep -q 'id="adminClear"' owner-ipad.html
          grep -q 'id="mobileAction"' staff.html
          grep -q 'id="board"' owner-ipad.html

          python - <<'PY_VALIDATE'
          from pathlib import Path
          import re

          pages = ["staff.html", "owner-ipad.html"]
          required = {
              "staff.html": [
                  "HAIR-NEXT-7-STAFF-WORKFLOW-20260722",
                  'id="statusFlow"',
                  'id="saveHairButton"',
                  'id="saveFormulaButton"',
                  'id="uploadPhotoButton"',
                  'id="saveProposalButton"',
              ],
              "owner-ipad.html": [
                  "HAIR-NEXT-7-IPAD-RECEPTION-20260722",
                  'id="laneBefore"',
                  'id="laneInside"',
                  'id="lanePayment"',
                  'id="laneDone"',
                  'id="manualModal"',
              ],
          }

          for page in pages:
              text = Path(page).read_text(encoding="utf-8")
              for item in required[page]:
                  assert item in text, (page, item)

              static_html = text.split("<script", 1)[0]
              ids = re.findall(r'\bid="([^"]+)"', static_html)
              duplicates = sorted(set(item for item in ids if ids.count(item) > 1))
              assert not duplicates, (page, duplicates)

              scripts = re.findall(
                  r"<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>",
                  text,
                  re.S | re.I,
              )
              Path("/tmp/" + page + ".inline.js").write_text(
                  "\n".join(scripts),
                  encoding="utf-8",
              )

          print("NEXT-7 static HTML validation: OK")
          PY_VALIDATE

          node --check /tmp/staff.html.inline.js
          node --check /tmp/owner-ipad.html.inline.js

          grep -q 'ADMIN_DAY:' config.js
          grep -q 'ADMIN_TODAY:' config.js
          grep -q 'ADMIN_CUSTOMER_DETAIL:' config.js
          grep -q 'ADMIN_HAIR_RECORD_SAVE:' config.js
          grep -q 'ADMIN_NEXT_PROPOSAL_SAVE:' config.js
          grep -q 'ADMIN_MANUAL_RESERVATION:' config.js

      - name: Remove temporary workflow
        shell: bash
        run: rm -f ".github/workflows/step-hair-next-7-staff-ipad.yml"

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "DPRO Deploy Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A staff.html owner-ipad.html ".github/workflows/step-hair-next-7-staff-ipad.yml"
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "STEP HAIR-NEXT-7 improve staff and iPad workflows"
          git push origin main
